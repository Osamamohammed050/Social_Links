  <style>
    body {
      background-color: #0f0f11; /* لون الخلفية الداكنة المتناسق مع موقعك */
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    #loading-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 99999;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top: 4px solid #FFD700; /* اللون الأصفر الاحترافي */
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  
  <div id="loading-container">
    <div class="spinner"></div>
  </div>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    window.addEventListener('load', function() {
      // ننتظر ثواني بسيطة للتأكد من استقرار الـ Engine ثم نخفيه بسلاسة
      setTimeout(function() {
        var loader = document.getElementById('loading-container');
        if (loader) {
          loader.style.transition = 'opacity 0.5s ease';
          loader.style.opacity = '0';
          setTimeout(function() {
            loader.remove();
          }, 500);
        }
      }, 200);
    });
  </script>
</body>
